<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor 360</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css"/>
    <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>
    <style>
    body { margin: 0; font-family: Arial; background: #000; }

    #panorama { width: 100%; height: 85vh; }

    .menu {
        height: 15vh;
        display: flex;
        align-items: center;
        overflow-x: auto;
        gap: 10px;
        padding: 10px;
        background: #111;
    }

    .menu::-webkit-scrollbar {
        height: 6px;
    }

    .menu::-webkit-scrollbar-thumb {
        background: #444;
        border-radius: 10px;
    }

    .item {
        min-width: 120px;
        height: 80px;
        border-radius: 8px;
        overflow: hidden;
        cursor: pointer;
        position: relative;
        border: 2px solid transparent;
        transition: 0.3s;
    }

    .item:hover {
        border: 2px solid #0a84ff;
        transform: scale(1.05);
    }

    .item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .item span {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0,0,0,0.6);
        color: white;
        font-size: 12px;
        text-align: center;
    }
</style>
</head>
<body>

<div id="panorama"></div>

<div class="menu" id="menu"> 
</div>

<script>
    const carpeta = "360/";
    let viewer;
    let imagenes = [];
    let indexActual = 0;

    let yaw = 0;
    let pitch = 0;
    let animacion;
    let reinicioTimeout;
    let cambioImagenIntervalo;
    //JS para generar miniaturas automáticamente
    const menu = document.getElementById("menu");

    imagenes.forEach((img, i) => {
        const item = document.createElement("div");
        item.className = "item";

        item.innerHTML = `
            <img src="${carpeta + img}">
            <span>Imagen ${i + 1}</span>
        `;

        item.onclick = () => {
            viewer.loadScene({
                type: 'equirectangular',
                panorama: carpeta + img
            });
        };

        menu.appendChild(item);
    });

    // 📥 Cargar JSON
    fetch('imagenes.json')
        .then(res => res.json())
        .then(data => {
            imagenes = data;

            iniciarVisor();
            iniciarMovimiento();
            iniciarCambioImagen();
        });

    // 🎬 Inicializar visor
    function iniciarVisor() {
        viewer = pannellum.viewer('panorama', {
            type: 'equirectangular',
            panorama: carpeta + imagenes[0],
            autoLoad: true,
            showControls: true
        });
    }

    // 🎥 Movimiento tipo dron
    function iniciarMovimiento() {
        detenerMovimiento();

        animacion = setInterval(() => {
            yaw += 0.2;
            pitch = 10 * Math.sin(yaw * 0.05);

            viewer.setYaw(yaw);
            viewer.setPitch(pitch);
        }, 30);
    }

    function detenerMovimiento() {
        clearInterval(animacion);
    }

    // 🔄 Cambio automático de imágenes
    function iniciarCambioImagen() {
        cambioImagenIntervalo = setInterval(() => {
            indexActual = (indexActual + 1) % imagenes.length;

            viewer.loadScene({
                type: 'equirectangular',
                panorama: carpeta + imagenes[indexActual]
            });

        }, 20000); // cada 20 segundos
    }

    function detenerCambioImagen() {
        clearInterval(cambioImagenIntervalo);
    }

    // ⏱ Reinicio después de interacción
    function reiniciarLuego() {
        clearTimeout(reinicioTimeout);

        reinicioTimeout = setTimeout(() => {
            iniciarMovimiento();
            iniciarCambioImagen();
        }, 4000);
    }

    // 🖱 Eventos usuario
    const visor = document.getElementById("panorama");

    visor.addEventListener("mousedown", () => {
        detenerMovimiento();
        detenerCambioImagen();
        reiniciarLuego();
    });

    visor.addEventListener("wheel", () => {
        detenerMovimiento();
        detenerCambioImagen();
        reiniciarLuego();
    });

    visor.addEventListener("touchstart", () => {
        detenerMovimiento();
        detenerCambioImagen();
        reiniciarLuego();
    });
</script>

</body>
</html>
