<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor 360</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css"/>
    <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>
    <style>
        body { margin: 0; font-family: Arial; }
        #panorama { width: 100%; height: 90vh; }
        .menu {
            height: 10vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            background: #111;
        }
        button {
            padding: 10px 15px;
            border: none;
            background: #0a84ff;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div id="panorama"></div>

<div class="menu">
    <button onclick="cambiar('img1')">Imagen 1</button>
    <button onclick="cambiar('img2')">Imagen 2</button>
</div>

<script>
    const carpeta = "360/";
    let viewer;
    let indexActual = 0;
    let imagenes = [];

    fetch('imagenes.json')
        .then(res => res.json())
        .then(data => {
            imagenes = data;

            viewer = pannellum.viewer('panorama', {
                type: 'equirectangular',
                panorama: carpeta + imagenes[0],
                autoLoad: true,
                autoRotate: -2
            });

            iniciarTour();
        });

    function iniciarTour() {
        setInterval(() => {
            indexActual = (indexActual + 1) % imagenes.length;

            viewer.loadScene({
                type: 'equirectangular',
                panorama: carpeta + imagenes[indexActual],
                autoRotate: -2
            });

        }, 8000);
    }
</script>

</body>
</html>
