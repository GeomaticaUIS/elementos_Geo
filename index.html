<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor 360</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css"/>
    <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>
    <style>
        body { margin: 0; font-family: Arial; }
        #panorama { width: 100%; height: 90vh; }
        .menu {
            height: 10vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            background: #111;
        }
        button {
            padding: 10px 15px;
            border: none;
            background: #0a84ff;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div id="panorama"></div>

<div class="menu">
    <button onclick="cambiar('img1')">Imagen 1</button>
    <button onclick="cambiar('img2')">Imagen 2</button>
</div>

<script>
    const carpeta = "360/";
    let viewer;
    let imagenes = [];
    let indexActual = 0;

    let yaw = 0;
    let pitch = 0;
    let animacion;
    let reinicioTimeout;
    let cambioImagenIntervalo;

    // 📥 Cargar JSON
    fetch('imagenes.json')
        .then(res => res.json())
        .then(data => {
            imagenes = data;

            iniciarVisor();
            iniciarMovimiento();
            iniciarCambioImagen();
        });

    // 🎬 Inicializar visor
    function iniciarVisor() {
        viewer = pannellum.viewer('panorama', {
            type: 'equirectangular',
            panorama: carpeta + imagenes[0],
            autoLoad: true,
            showControls: true
        });
    }

    // 🎥 Movimiento tipo dron
    function iniciarMovimiento() {
        detenerMovimiento();

        animacion = setInterval(() => {
            yaw += 0.2;
            pitch = 10 * Math.sin(yaw * 0.05);

            viewer.setYaw(yaw);
            viewer.setPitch(pitch);
        }, 30);
    }

    function detenerMovimiento() {
        clearInterval(animacion);
    }

    // 🔄 Cambio automático de imágenes
    function iniciarCambioImagen() {
        cambioImagenIntervalo = setInterval(() => {
            indexActual = (indexActual + 1) % imagenes.length;

            viewer.loadScene({
                type: 'equirectangular',
                panorama: carpeta + imagenes[indexActual]
            });

        }, 10000); // cada 10 segundos
    }

    function detenerCambioImagen() {
        clearInterval(cambioImagenIntervalo);
    }

    // ⏱ Reinicio después de interacción
    function reiniciarLuego() {
        clearTimeout(reinicioTimeout);

        reinicioTimeout = setTimeout(() => {
            iniciarMovimiento();
            iniciarCambioImagen();
        }, 4000);
    }

    // 🖱 Eventos usuario
    const visor = document.getElementById("panorama");

    visor.addEventListener("mousedown", () => {
        detenerMovimiento();
        detenerCambioImagen();
        reiniciarLuego();
    });

    visor.addEventListener("wheel", () => {
        detenerMovimiento();
        detenerCambioImagen();
        reiniciarLuego();
    });

    visor.addEventListener("touchstart", () => {
        detenerMovimiento();
        detenerCambioImagen();
        reiniciarLuego();
    });
</script>

</body>
</html>
